services:

  postgres:
    image: postgres:17-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       webhooks
      POSTGRES_USER:     webhook
      POSTGRES_PASSWORD: webhook_pass  # ganti di production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhooks"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "1333:1333"
    environment:
      PORT:           "1333"
      DATABASE_URL:   "postgresql://webhook:webhook_pass@postgres:5432/webhooks"
      SESSION_SECRET: "ganti-ini-dengan-string-acak-panjang-di-production"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1333/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
    driver: local
