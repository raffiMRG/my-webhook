<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — my-webhook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --input-bg: #0d1117;
      --accent: #2f81f7; --red: #f85149;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh; gap: 16px;
    }
    .logo { font-size: 22px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px 28px 24px; width: 340px;
    }
    h1 { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 20px; }
    .error {
      background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.35);
      border-radius: 6px; padding: 8px 12px; font-size: 12px;
      color: var(--red); margin-bottom: 14px; display: none;
    }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,129,247,.15); }
    button[type="submit"] {
      width: 100%; margin-top: 6px; background: var(--accent); border: none;
      border-radius: 6px; padding: 9px; color: #fff; font-size: 14px;
      font-weight: 500; cursor: pointer; transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .88; }
    .footer { font-size: 12px; color: var(--muted); text-align: center; }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">⚡ <span>my-webhook</span></div>

  <div class="card">
    <h1>Create an account</h1>

    <div class="error" id="err"></div>

    <form method="POST" action="/register">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus
               minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" />
        <div class="hint">3–30 characters, letters, numbers, and underscores only.</div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" />
        <div class="hint">Minimum 8 characters.</div>
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />
      </div>
      <button type="submit">Create account</button>
    </form>
  </div>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>

  <script>
    const msgs = {
      missing:           'Please fill in all fields.',
      username_length:   'Username must be between 3 and 30 characters.',
      username_chars:    'Username may only contain letters, numbers, and underscores.',
      username_taken:    'That username is already taken.',
      password_short:    'Password must be at least 8 characters.',
      password_mismatch: 'Passwords do not match.',
      server:            'Server error. Please try again.',
    };
    const err = new URLSearchParams(location.search).get('error');
    if (err) {
      const el = document.getElementById('err');
      el.textContent = msgs[err] || 'An error occurred.';
      el.style.display = 'block';
    }

    // Client-side confirm validation
    document.querySelector('form').addEventListener('submit', e => {
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      if (p !== c) {
        e.preventDefault();
        const el = document.getElementById('err');
        el.textContent = msgs.password_mismatch;
        el.style.display = 'block';
      }
    });
  </script>
</body>
</html>
